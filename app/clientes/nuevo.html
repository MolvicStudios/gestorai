<!DOCTYPE html>
<html lang="es" class="tema-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuevo Cliente — GestorAI.pro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <div class="container" style="max-width:600px; padding:2rem 1rem;">
        <a href="/app/clientes/" style="color:var(--color-text-muted); font-size:.9rem; text-decoration:none;">← Volver a clientes</a>
        <h1 style="font-size:1.5rem; margin:.75rem 0 1.5rem;" id="page-title">Nuevo cliente</h1>

        <div class="card" style="padding:1.5rem;">
          <div class="form-group">
            <label for="cl-nombre">Nombre / Razón social *</label>
            <input type="text" id="cl-nombre" class="input" required>
          </div>
          <div class="form-group">
            <label for="cl-nif">NIF / CIF</label>
            <input type="text" id="cl-nif" class="input" placeholder="12345678A">
          </div>
          <div class="form-group">
            <label for="cl-email">Email</label>
            <input type="email" id="cl-email" class="input">
          </div>
          <div class="form-group">
            <label for="cl-telefono">Teléfono</label>
            <input type="tel" id="cl-telefono" class="input">
          </div>
          <div class="form-group">
            <label for="cl-direccion">Dirección</label>
            <input type="text" id="cl-direccion" class="input">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label for="cl-cp">Código postal</label>
              <input type="text" id="cl-cp" class="input" maxlength="5">
            </div>
            <div class="form-group">
              <label for="cl-ciudad">Ciudad</label>
              <input type="text" id="cl-ciudad" class="input">
            </div>
          </div>
          <div class="form-group">
            <label for="cl-notas">Notas</label>
            <textarea id="cl-notas" class="input" rows="3" style="resize:vertical;"></textarea>
          </div>

          <button class="btn btn-primary" id="btn-guardar" style="width:100%; margin-top:1rem;">Guardar cliente</button>
          <div id="msg" style="margin-top:1rem;"></div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initAppShell } from '/js/app-shell.js';
    import { initAuth, initAppPage, getUser, supabase as sb } from '/js/auth.js';
    import { initChatbot } from '/js/chatbot.js';

    initAppShell();
    await initAuth();
    initChatbot();
    await initAppPage();

    const user = await getUser();
    if (!user) { window.location.href = '/'; }

    const params = new URLSearchParams(window.location.search);
    const editId = params.get('id');
    let isEditing = false;

    // If editing, load existing client
    if (editId) {
      isEditing = true;
      document.getElementById('page-title').textContent = 'Editar cliente';
      const { data: cl } = await sb.from('clientes').select('*').eq('id', editId).eq('user_id', user.id).single();
      if (cl) {
        document.getElementById('cl-nombre').value = cl.nombre || '';
        document.getElementById('cl-nif').value = cl.nif || '';
        document.getElementById('cl-email').value = cl.email || '';
        document.getElementById('cl-telefono').value = cl.telefono || '';
        document.getElementById('cl-direccion').value = cl.direccion || '';
        document.getElementById('cl-cp').value = cl.codigo_postal || '';
        document.getElementById('cl-ciudad').value = cl.ciudad || '';
        document.getElementById('cl-notas').value = cl.notas || '';
      }
    }

    document.getElementById('btn-guardar').addEventListener('click', async () => {
      const nombre = document.getElementById('cl-nombre').value.trim();
      const msgEl = document.getElementById('msg');
      if (!nombre) { msgEl.innerHTML = '<div class="alert alert-danger">El nombre es obligatorio.</div>'; return; }

      const payload = {
        nombre,
        nif: document.getElementById('cl-nif').value.trim(),
        email: document.getElementById('cl-email').value.trim(),
        telefono: document.getElementById('cl-telefono').value.trim(),
        direccion: document.getElementById('cl-direccion').value.trim(),
        codigo_postal: document.getElementById('cl-cp').value.trim(),
        ciudad: document.getElementById('cl-ciudad').value.trim(),
        notas: document.getElementById('cl-notas').value.trim(),
        user_id: user.id
      };

      let result;
      if (isEditing) {
        result = await sb.from('clientes').update(payload).eq('id', editId).eq('user_id', user.id);
      } else {
        result = await sb.from('clientes').insert(payload);
      }

      if (result.error) {
        msgEl.innerHTML = `<div class="alert alert-danger">${result.error.message}</div>`;
      } else {
        window.location.href = '/app/clientes/';
      }
    });
  </script>
</body>
</html>
