<!DOCTYPE html>
<html lang="es" class="tema-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — GestorAI.pro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar loaded by app shell -->
    <main class="app-main">
      <div class="container" style="max-width:720px; padding:2rem 1rem;">
        <a href="/app/dashboard.html" style="display:inline-flex; align-items:center; gap:.4rem; color:var(--color-text-muted); text-decoration:none; font-size:.9rem; margin-bottom:1rem;">&larr; Volver al Dashboard</a>
        <h1 style="font-size:1.5rem; margin-bottom:.5rem;">Mi Perfil</h1>
        <p style="color:var(--color-text-muted); margin-bottom:2rem;">Gestiona tus datos fiscales y preferencias.</p>

        <div class="card" style="padding:1.5rem; margin-bottom:1.5rem;">
          <h2 style="font-size:1.1rem; margin-bottom:1rem;">Datos personales</h2>
          <div class="form-group">
            <label for="pf-nombre">Nombre completo</label>
            <input type="text" id="pf-nombre" class="input">
          </div>
          <div class="form-group">
            <label for="pf-nif">NIF / CIF</label>
            <input type="text" id="pf-nif" class="input">
          </div>
          <div class="form-group">
            <label for="pf-empresa">Empresa</label>
            <input type="text" id="pf-empresa" class="input">
          </div>
          <div class="form-group">
            <label for="pf-direccion">Dirección</label>
            <input type="text" id="pf-direccion" class="input">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
              <label for="pf-cp">Código postal</label>
              <input type="text" id="pf-cp" class="input" maxlength="5">
            </div>
            <div class="form-group">
              <label for="pf-ciudad">Ciudad</label>
              <input type="text" id="pf-ciudad" class="input">
            </div>
          </div>
          <div class="form-group">
            <label for="pf-forma-juridica">Forma jurídica</label>
            <select id="pf-forma-juridica" class="input">
              <option value="autonomo">Autónomo / Persona física</option>
              <option value="sl">Sociedad Limitada (SL)</option>
              <option value="slu">Sociedad Limitada Unipersonal (SLU)</option>
              <option value="sa">Sociedad Anónima (SA)</option>
              <option value="slp">Sociedad Limitada Profesional (SLP)</option>
              <option value="cb">Comunidad de Bienes (CB)</option>
              <option value="sc">Sociedad Civil (SC)</option>
              <option value="cooperativa">Cooperativa</option>
              <option value="asociacion">Asociación / Fundación</option>
              <option value="otro_forma">Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label for="pf-actividad">Sector profesional</label>
            <select id="pf-actividad" class="input">
              <optgroup label="Tecnología e Informática">
                <option value="desarrollo_software">Desarrollo de software</option>
                <option value="diseno_web">Diseño y desarrollo web</option>
                <option value="consultoria_it">Consultoría IT / Transformación digital</option>
                <option value="ciberseguridad">Ciberseguridad</option>
                <option value="datos_ia">Datos e inteligencia artificial</option>
                <option value="soporte_tecnico">Soporte técnico y sistemas</option>
                <option value="telecomunicaciones">Telecomunicaciones</option>
              </optgroup>
              <optgroup label="Arquitectura e Ingeniería">
                <option value="arquitectura">Arquitectura</option>
                <option value="ingenieria_civil">Ingeniería civil</option>
                <option value="ingenieria_industrial">Ingeniería industrial</option>
                <option value="topografia">Topografía y cartografía</option>
              </optgroup>
              <optgroup label="Legal y Jurídico">
                <option value="abogacia">Abogacía</option>
                <option value="asesoria_fiscal">Asesoría fiscal y tributaria</option>
                <option value="gestoria">Gestoría administrativa</option>
                <option value="notaria">Notaría y registro</option>
                <option value="procuraduria">Procuraduría</option>
              </optgroup>
              <optgroup label="Finanzas y Contabilidad">
                <option value="contabilidad">Contabilidad y auditoría</option>
                <option value="banca_seguros">Banca y seguros</option>
                <option value="inversion_finanzas">Inversión y finanzas</option>
                <option value="administracion_fincas">Administración de fincas</option>
              </optgroup>
              <optgroup label="Salud y Bienestar">
                <option value="medicina">Medicina general / Especialista</option>
                <option value="odontologia">Odontología</option>
                <option value="psicologia">Psicología y psiquiatría</option>
                <option value="fisioterapia">Fisioterapia y rehabilitación</option>
                <option value="farmacia">Farmacia</option>
                <option value="veterinaria">Veterinaria</option>
                <option value="nutricion">Nutrición y dietética</option>
                <option value="optica">Óptica y optometría</option>
              </optgroup>
              <optgroup label="Creatividad y Comunicación">
                <option value="diseno_grafico">Diseño gráfico</option>
                <option value="fotografia_video">Fotografía y vídeo</option>
                <option value="publicidad_marketing">Publicidad y marketing</option>
                <option value="periodismo">Periodismo y medios</option>
                <option value="traduccion">Traducción e interpretación</option>
                <option value="produccion_audiovisual">Producción audiovisual</option>
              </optgroup>
              <optgroup label="Formación y Educación">
                <option value="formacion_academica">Formación académica</option>
                <option value="formacion_profesional">Formación profesional / Coaching</option>
                <option value="idiomas">Enseñanza de idiomas</option>
                <option value="educacion_infantil">Educación infantil</option>
              </optgroup>
              <optgroup label="Hostelería y Restauración">
                <option value="restaurante_bar">Restaurante / Bar / Cafetería</option>
                <option value="hotel_alojamiento">Hotel / Alojamiento turístico</option>
                <option value="catering">Catering y eventos</option>
                <option value="turismo_agencia">Agencia de viajes / Turismo</option>
              </optgroup>
              <optgroup label="Transporte y Logística">
                <option value="transporte_mercancias">Transporte de mercancías</option>
                <option value="transporte_pasajeros">Transporte de pasajeros / VTC</option>
                <option value="mensajeria">Mensajería y paquetería</option>
                <option value="logistica_almacen">Logística y almacenamiento</option>
              </optgroup>
              <optgroup label="Comercio">
                <option value="comercio_minorista">Comercio minorista</option>
                <option value="comercio_mayorista">Comercio mayorista</option>
                <option value="ecommerce">E-commerce</option>
                <option value="importacion_exportacion">Importación / Exportación</option>
              </optgroup>
              <optgroup label="Servicios técnicos y Mantenimiento">
                <option value="electricidad">Electricidad e instalaciones</option>
                <option value="fontaneria">Fontanería y climatización</option>
                <option value="construccion_reformas">Construcción y reformas</option>
                <option value="limpieza">Limpieza profesional</option>
                <option value="jardineria">Jardinería y paisajismo</option>
                <option value="mecanica_auto">Mecánica y automoción</option>
              </optgroup>
              <optgroup label="Agricultura, Ganadería y Medio Ambiente">
                <option value="agricultura">Agricultura</option>
                <option value="ganaderia">Ganadería</option>
                <option value="pesca">Pesca y acuicultura</option>
                <option value="medio_ambiente">Medio ambiente y energías renovables</option>
              </optgroup>
              <optgroup label="Deporte y Ocio">
                <option value="entrenamiento_personal">Entrenamiento personal</option>
                <option value="gimnasio_centro">Gimnasio / Centro deportivo</option>
                <option value="ocio_entretenimiento">Ocio y entretenimiento</option>
              </optgroup>
              <optgroup label="Servicios personales">
                <option value="peluqueria_estetica">Peluquería y estética</option>
                <option value="asistencia_domicilio">Asistencia a domicilio</option>
                <option value="seguridad_privada">Seguridad privada</option>
              </optgroup>
              <optgroup label="Otros">
                <option value="otro_sector">Otro sector no listado</option>
              </optgroup>
            </select>
          </div>
        </div>

        <div class="card" style="padding:1.5rem; margin-bottom:1.5rem;">
          <h2 style="font-size:1.1rem; margin-bottom:1rem;">Comunidad Autónoma</h2>
          <div id="ccaa-container"></div>
          <div id="regimen-info" style="margin-top:1rem;"></div>
        </div>

        <div class="card" style="padding:1.5rem; margin-bottom:1.5rem;">
          <h2 style="font-size:1.1rem; margin-bottom:1rem;">Plan actual</h2>
          <p>Tu plan: <strong id="user-plan">Free</strong></p>
          <p style="color:var(--color-text-muted); font-size:.9rem;" id="user-email"></p>
          <button class="btn btn-primary" style="margin-top:1rem;" id="btn-upgrade">Mejorar a Pro</button>
        </div>

        <button class="btn btn-primary" id="btn-save" style="width:100%;">Guardar cambios</button>
        <button class="btn btn-ghost" id="btn-logout" style="width:100%; margin-top:.75rem; color:var(--color-danger);">Cerrar sesión</button>
      </div>
    </main>
  </div>

  <script type="module">
    import { initAuth, initAppPage, getUser, updateProfile, supabase as sb } from '/js/auth.js';
    import { initChatbot } from '/js/chatbot.js';
    import { renderCCAAGrid, renderRegimenPanel, saveCCAAToProfile } from '/js/ccaa-selector.js';
    import LicenseSystem from '/js/license.js';
    import { showUpgradeModal } from '/js/upgrade-modal.js';

    await initAuth();
    initChatbot();
    await initAppPage();

    const user = await getUser();
    if (!user) { window.location.href = '/'; }

    // Load profile data
    const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
    if (profile) {
      document.getElementById('pf-nombre').value = profile.nombre || '';
      document.getElementById('pf-nif').value = profile.nif || '';
      document.getElementById('pf-empresa').value = profile.empresa || '';
      document.getElementById('pf-direccion').value = profile.direccion || '';
      document.getElementById('pf-cp').value = profile.codigo_postal || '';
      document.getElementById('pf-ciudad').value = profile.ciudad || '';
      if (profile.forma_juridica) document.getElementById('pf-forma-juridica').value = profile.forma_juridica;
      if (profile.tipo_actividad) document.getElementById('pf-actividad').value = profile.tipo_actividad;
    }

    let selectedCcaa = profile?.ccaa || null;
    renderCCAAGrid('ccaa-container', (ccaa) => {
      selectedCcaa = ccaa.codigo;
      renderRegimenPanel('regimen-info', ccaa);
    });

    // Hide upgrade if already Pro
    if (LicenseSystem.isPro()) {
      document.getElementById('btn-upgrade').style.display = 'none';
      document.getElementById('user-plan').textContent = 'Pro ✨';
    }
    document.getElementById('btn-upgrade')?.addEventListener('click', () => {
      showUpgradeModal('facturas');
    });

    document.getElementById('btn-save').addEventListener('click', async () => {
      const updates = {
        nombre: document.getElementById('pf-nombre').value.trim(),
        nif: document.getElementById('pf-nif').value.trim(),
        empresa: document.getElementById('pf-empresa').value.trim(),
        direccion: document.getElementById('pf-direccion').value.trim(),
        codigo_postal: document.getElementById('pf-cp').value.trim(),
        ciudad: document.getElementById('pf-ciudad').value.trim(),
        forma_juridica: document.getElementById('pf-forma-juridica').value,
        tipo_actividad: document.getElementById('pf-actividad').value,
        ccaa: selectedCcaa
      };
      const ok = await updateProfile(updates);
      if (ok) alert('Perfil actualizado correctamente.');
      else alert('Error al guardar. Inténtalo de nuevo.');
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await sb.auth.signOut();
      window.location.href = '/';
    });
  </script>
</body>
</html>
