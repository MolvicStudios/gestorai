<!DOCTYPE html>
<html lang="es" class="tema-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding — GestorAI.pro</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--color-bg); }
    .onboarding-container { max-width: 560px; width: 95%; padding: 2rem; }
    .onboarding-header { text-align: center; margin-bottom: 2rem; }
    .onboarding-header img { width: 48px; margin-bottom: .5rem; }
    .onboarding-header h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    .onboarding-header p { color: var(--color-text-muted); font-size: .95rem; }
    .onboarding-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .onboarding-nav { display: flex; justify-content: space-between; margin-top: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .25rem; font-weight: 500; font-size: .9rem; }
    .form-group input, .form-group select {
      width: 100%; padding: .6rem .75rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-bg);
      color: var(--color-text);
      font-size: .95rem;
    }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="onboarding-container">
    <div class="onboarding-header">
      <img src="/assets/logo.svg" alt="GestorAI">
      <h1>Configura tu cuenta</h1>
      <p>Completa tu perfil para personalizar la experiencia.</p>
    </div>

    <!-- Step indicators -->
    <div class="step-indicators">
      <div class="step-indicator active">1</div>
      <div class="step-indicator">2</div>
      <div class="step-indicator">3</div>
    </div>

    <div class="onboarding-card">
      <!-- Step 1: Business data -->
      <div id="step-datos-empresa">
        <h2 style="font-size:1.2rem; margin-bottom:1rem;">Datos de tu negocio</h2>
        <div class="form-group">
          <label for="ob-nombre">Nombre completo *</label>
          <input type="text" id="ob-nombre" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
          <label for="ob-nif">NIF / CIF *</label>
          <input type="text" id="ob-nif" placeholder="12345678A" required>
        </div>
        <div class="form-group">
          <label for="ob-empresa">Nombre empresa (opcional)</label>
          <input type="text" id="ob-empresa" placeholder="Mi Empresa SL">
        </div>
        <div class="form-group">
          <label for="ob-direccion">Dirección</label>
          <input type="text" id="ob-direccion" placeholder="Calle, número, piso">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="ob-cp">Código postal</label>
            <input type="text" id="ob-cp" placeholder="28001" maxlength="5">
          </div>
          <div class="form-group">
            <label for="ob-ciudad">Ciudad</label>
            <input type="text" id="ob-ciudad" placeholder="Madrid">
          </div>
        </div>
        <div class="form-group">
          <label for="ob-forma-juridica">Forma jurídica</label>
          <select id="ob-forma-juridica">
            <option value="autonomo">Autónomo / Persona física</option>
            <option value="sl">Sociedad Limitada (SL / SLU)</option>
            <option value="sa">Sociedad Anónima (SA)</option>
            <option value="slp">Sociedad Limitada Profesional (SLP)</option>
            <option value="cb">Comunidad de Bienes (CB)</option>
            <option value="sc">Sociedad Civil (SC)</option>
            <option value="cooperativa">Cooperativa</option>
            <option value="asociacion">Asociación / Fundación</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div class="form-group">
          <label for="ob-actividad">Sector profesional</label>
          <select id="ob-actividad">
            <optgroup label="💻 Tecnología y digital">
              <option value="desarrollo_software">Desarrollo de software</option>
              <option value="diseno_web">Diseño web y gráfico</option>
              <option value="marketing_digital">Marketing digital y SEO/SEM</option>
              <option value="consultoria_it">Consultoría IT</option>
              <option value="ecommerce">Comercio electrónico</option>
              <option value="videojuegos">Videojuegos y apps</option>
              <option value="ciberseguridad">Ciberseguridad</option>
              <option value="data_ia">Datos e inteligencia artificial</option>
            </optgroup>
            <optgroup label="📐 Arquitectura, ingeniería y construcción">
              <option value="arquitectura">Arquitectura</option>
              <option value="ingenieria">Ingeniería</option>
              <option value="construccion">Construcción y reformas</option>
              <option value="instalaciones">Instalaciones (electricidad, fontanería, clima)</option>
              <option value="topografia">Topografía y cartografía</option>
            </optgroup>
            <optgroup label="⚖️ Legal y asesoría">
              <option value="abogacia">Abogacía</option>
              <option value="asesoria_fiscal">Asesoría fiscal y contable</option>
              <option value="gestoria">Gestoría administrativa</option>
              <option value="notaria">Notaría y procuraduría</option>
              <option value="mediacion">Mediación y arbitraje</option>
            </optgroup>
            <optgroup label="💰 Finanzas y seguros">
              <option value="contabilidad">Contabilidad y auditoría</option>
              <option value="seguros">Seguros y correduría</option>
              <option value="finanzas">Asesoría financiera e inversiones</option>
              <option value="inmobiliaria">Agencia inmobiliaria</option>
            </optgroup>
            <optgroup label="🏥 Salud y bienestar">
              <option value="medicina">Medicina general / especialista</option>
              <option value="odontologia">Odontología</option>
              <option value="psicologia">Psicología</option>
              <option value="fisioterapia">Fisioterapia y osteopatía</option>
              <option value="farmacia">Farmacia</option>
              <option value="veterinaria">Veterinaria</option>
              <option value="optica">Óptica y optometría</option>
              <option value="nutricion">Nutrición y dietética</option>
              <option value="estetica_salud">Estética y podología</option>
            </optgroup>
            <optgroup label="🎨 Creatividad y comunicación">
              <option value="fotografia">Fotografía y vídeo</option>
              <option value="publicidad">Publicidad y comunicación</option>
              <option value="periodismo">Periodismo y redacción</option>
              <option value="traduccion">Traducción e interpretación</option>
              <option value="musica">Música y producción audiovisual</option>
              <option value="arte">Arte, ilustración y artesanía</option>
            </optgroup>
            <optgroup label="📚 Formación y educación">
              <option value="formacion">Formación y coaching</option>
              <option value="academia">Academia y clases particulares</option>
              <option value="idiomas">Enseñanza de idiomas</option>
              <option value="educacion_infantil">Educación infantil / guardería</option>
            </optgroup>
            <optgroup label="🍽️ Hostelería y alimentación">
              <option value="restauracion">Restauración (bar, restaurante, cafetería)</option>
              <option value="catering">Catering y eventos</option>
              <option value="panaderia">Panadería y pastelería</option>
              <option value="alimentacion">Comercio de alimentación</option>
            </optgroup>
            <optgroup label="🚗 Transporte y logística">
              <option value="transporte_mercancias">Transporte de mercancías</option>
              <option value="transporte_personas">Transporte de personas (taxi, VTC)</option>
              <option value="mensajeria">Mensajería y paquetería</option>
              <option value="logistica">Logística y almacén</option>
            </optgroup>
            <optgroup label="🏪 Comercio y retail">
              <option value="comercio_minorista">Comercio minorista</option>
              <option value="comercio_mayorista">Comercio mayorista</option>
              <option value="moda">Moda y textil</option>
              <option value="joyeria">Joyería y relojería</option>
              <option value="ferreteria">Ferretería y suministros</option>
            </optgroup>
            <optgroup label="🔧 Servicios técnicos y mantenimiento">
              <option value="mecanica">Mecánica y automoción</option>
              <option value="limpieza">Limpieza profesional</option>
              <option value="jardineria">Jardinería y paisajismo</option>
              <option value="reparaciones">Reparaciones y mantenimiento</option>
              <option value="seguridad_privada">Seguridad privada</option>
            </optgroup>
            <optgroup label="🌾 Agricultura y medio ambiente">
              <option value="agricultura">Agricultura y ganadería</option>
              <option value="pesca">Pesca y acuicultura</option>
              <option value="forestal">Actividades forestales</option>
              <option value="medio_ambiente">Consultoría medioambiental</option>
              <option value="energias_renovables">Energías renovables</option>
            </optgroup>
            <optgroup label="🏋️ Deporte y ocio">
              <option value="entrenamiento">Entrenamiento personal y fitness</option>
              <option value="deporte">Actividades deportivas</option>
              <option value="turismo">Turismo y agencia de viajes</option>
              <option value="ocio">Ocio y entretenimiento</option>
            </optgroup>
            <optgroup label="🏠 Servicios personales">
              <option value="peluqueria">Peluquería y barbería</option>
              <option value="estetica">Centro de estética</option>
              <option value="cuidado_personas">Cuidado de personas (mayores, niños)</option>
              <option value="servicios_hogar">Servicios del hogar</option>
            </optgroup>
            <optgroup label="📦 Otros sectores">
              <option value="industria">Industria y fabricación</option>
              <option value="mineria">Minería y canteras</option>
              <option value="investigacion">Investigación y desarrollo (I+D)</option>
              <option value="ong">ONG y tercer sector</option>
              <option value="otro_sector">Otro sector no listado</option>
            </optgroup>
          </select>
        </div>
        <div class="onboarding-nav">
          <div></div>
          <button class="btn btn-primary" data-next>Siguiente →</button>
        </div>
      </div>

      <!-- Step 2: CCAA + Regime -->
      <div id="step-regimen-ccaa" style="display:none;">
        <h2 style="font-size:1.2rem; margin-bottom:1rem;">Tu Comunidad Autónoma</h2>
        <p style="color:var(--color-text-muted); margin-bottom:1rem; font-size:.9rem;">Selecciona tu CCAA para adaptar impuestos y normativa.</p>
        <div id="ccaa-container"></div>
        <div id="regimen-info" style="display:none; margin-top:1rem;"></div>
        <div class="onboarding-nav">
          <button class="btn btn-secondary" data-prev>← Atrás</button>
          <button class="btn btn-primary" data-next>Siguiente →</button>
        </div>
      </div>

      <!-- Step 3: Confirmation -->
      <div id="step-confirmacion" style="display:none;">
        <h2 style="font-size:1.2rem; margin-bottom:1rem;">Confirmación</h2>
        <p style="color:var(--color-text-muted); margin-bottom:1rem; font-size:.9rem;">Revisa tus datos antes de continuar.</p>
        <div id="confirm-summary"></div>
        <div class="onboarding-nav" style="margin-top:1.5rem;">
          <button class="btn btn-secondary" data-prev>← Atrás</button>
          <button class="btn btn-primary" id="btn-finish">✓ Completar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth } from '/js/auth.js';
    import { initChatbot } from '/js/chatbot.js';
    import { initOnboarding } from '/js/onboarding.js';
    await initAuth();
    initChatbot();
    initOnboarding();
  </script>
</body>
</html>
