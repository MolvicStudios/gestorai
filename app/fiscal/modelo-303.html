<!DOCTYPE html>
<html lang="es" class="tema-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo 303 — GestorAI.pro</title>
  <meta name="theme-color" content="#0D7966">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <div class="app-topbar">
        <div>
          <a href="/app/fiscal/index.html" style="font-size:0.85rem; color:var(--color-text-muted);">← Volver a Fiscal</a>
          <h1>Modelo 303 — IVA</h1>
          <p style="color:var(--color-text-muted); margin:0;">Liquidación trimestral del IVA. Ley 37/1992.</p>
        </div>
      </div>

      <div class="card mb-3">
        <h3 style="margin-bottom:1rem;">IVA Repercutido (ventas)</h3>
        <div class="form-group">
          <label for="ventas-21">Base imponible ventas al 21% (€)</label>
          <input type="number" id="ventas-21" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="ventas-10">Base imponible ventas al 10% (€)</label>
          <input type="number" id="ventas-10" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="ventas-4">Base imponible ventas al 4% (€)</label>
          <input type="number" id="ventas-4" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>

      <div class="card mb-3">
        <h3 style="margin-bottom:1rem;">IVA Soportado (compras/gastos)</h3>
        <div class="form-group">
          <label for="compras-21">Base imponible compras al 21% (€)</label>
          <input type="number" id="compras-21" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="compras-10">Base imponible compras al 10% (€)</label>
          <input type="number" id="compras-10" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="compras-4">Base imponible compras al 4% (€)</label>
          <input type="number" id="compras-4" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
        <div class="form-group">
          <label for="compensacion">Compensación trimestre anterior (€)</label>
          <input type="number" id="compensacion" placeholder="0" min="0" step="0.01" inputmode="decimal">
        </div>
      </div>

      <button class="btn btn-primary btn-lg" style="width:100%;" id="btn-calcular">Calcular Modelo 303</button>

      <div id="resultado-area" class="card mt-3" style="display:none;"></div>
      <div class="mt-2">
        <button class="btn btn-secondary" id="btn-ia-consejo" style="display:none;">🤖 Pedir consejo a la IA</button>
      </div>
      <div id="ia-response" class="card mt-2" style="display:none; background:var(--color-primary-light);"></div>
    </main>
  </div>

  <script type="module">
    import { initAppShell } from '/js/app-shell.js';
    import { initAuth, getUser, supabase } from '/js/auth.js';
    import { initChatbot } from '/js/chatbot.js';
    import LicenseSystem from '/js/license.js';
    import { showUpgradeModal } from '/js/upgrade-modal.js';
    import { calcularModelo303 } from '/js/fiscal/calculos-iva.js';
    import { askIA, PROMPTS } from '/js/ia-client.js';

    initAppShell();
    await initAuth();
    initChatbot();
    const user = await getUser();
    if (!user) { window.location.href = '/'; throw new Error('No auth'); }
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
    if (!LicenseSystem.isPro()) { showUpgradeModal('modelos'); throw new Error('Upgrade required'); }

    const fmt = n => n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    document.getElementById('btn-calcular').addEventListener('click', () => {
      const ventasPorTipo = [
        { tipo: 21, base: parseFloat(document.getElementById('ventas-21').value) || 0 },
        { tipo: 10, base: parseFloat(document.getElementById('ventas-10').value) || 0 },
        { tipo: 4, base: parseFloat(document.getElementById('ventas-4').value) || 0 }
      ].filter(v => v.base > 0);

      const comprasPorTipo = [
        { tipo: 21, base: parseFloat(document.getElementById('compras-21').value) || 0 },
        { tipo: 10, base: parseFloat(document.getElementById('compras-10').value) || 0 },
        { tipo: 4, base: parseFloat(document.getElementById('compras-4').value) || 0 }
      ].filter(c => c.base > 0);

      const compensacionAnterior = parseFloat(document.getElementById('compensacion').value) || 0;
      const r = calcularModelo303({ ventasPorTipo, comprasPorTipo, compensacionAnterior });

      const el = document.getElementById('resultado-area');
      el.style.display = 'block';
      el.innerHTML = `
        <h3>📊 Resultado del cálculo — Modelo 303</h3>
        <div style="font-family:var(--font-mono); margin:1rem 0; line-height:2;">
          <div><strong>IVA Devengado (repercutido):</strong></div>
          ${r.devengado.map(d => `<div style="padding-left:1rem;">Base ${d.tipo}%: ${fmt(d.base)} € → Cuota: ${fmt(d.cuota)} €</div>`).join('')}
          <div>Total IVA devengado: <strong>${fmt(r.totalDevengado)} €</strong></div>
          <br>
          <div><strong>IVA Deducible (soportado):</strong></div>
          ${r.deducible.map(d => `<div style="padding-left:1rem;">Base ${d.tipo}%: ${fmt(d.base)} € → Cuota: ${fmt(d.cuota)} €</div>`).join('')}
          <div>Total IVA deducible: <strong>${fmt(r.totalDeducible)} €</strong></div>
          <br>
          <div>Diferencia: ${fmt(r.diferencia)} €</div>
          ${r.compensacionAnterior > 0 ? `<div>(−) Compensación anterior: ${fmt(r.compensacionAnterior)} €</div>` : ''}
          <hr style="border-color:var(--color-border); margin:0.5rem 0;">
          <div style="font-size:1.25rem; color:${r.aIngresar ? 'var(--color-danger)' : 'var(--color-success)'};">
            RESULTADO: <strong>${fmt(r.resultado)} €</strong>
            ${r.aIngresar ? '(a ingresar)' : '(a compensar)'}
          </div>
        </div>
      `;
      document.getElementById('btn-ia-consejo').style.display = 'inline-flex';
    });

    document.getElementById('btn-ia-consejo').addEventListener('click', async () => {
      const iaEl = document.getElementById('ia-response');
      iaEl.style.display = 'block';
      iaEl.innerHTML = '<div class="spinner" style="margin:1rem auto;"></div>';

      try {
        const content = await askIA({
          systemPrompt: PROMPTS.fiscal,
          userPrompt: `He calculado mi modelo 303 de IVA trimestral. ¿Tienes algún consejo para optimizar mi IVA soportado o alertas sobre el resultado?`,
          modulo: 'fiscal'
        });
        iaEl.innerHTML = `<p style="white-space:pre-wrap;">${content}</p>`;
      } catch (err) {
        iaEl.innerHTML = '<p style="color:var(--color-danger);">No se pudo conectar con la IA.</p>';
      }
    });
  </script>
</body>
</html>
