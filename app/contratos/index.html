<!DOCTYPE html>
<html lang="es" class="tema-claro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratos — GestorAI.pro</title>
  <meta name="theme-color" content="#0D7966">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="app-main">
      <div class="app-topbar">
        <h1>📝 Contratos</h1>
        <a href="/app/contratos/editor.html" class="btn btn-primary" id="btn-nuevo">+ Nuevo Contrato</a>
      </div>

      <div class="card" style="margin-bottom:1.5rem;">
        <p style="color:var(--color-text-muted); font-size:0.9rem;">Genera contratos profesionales con IA. Elige el tipo, completa los datos y obtén un borrador listo para revisar y firmar.</p>
      </div>

      <div id="lista-contratos">
        <div class="spinner" style="margin:2rem auto;"></div>
      </div>

      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-state-icon">📝</div>
        <p class="empty-state-text">Aún no tienes contratos</p>
        <a href="/app/contratos/editor.html" class="btn btn-primary">Crear primer contrato</a>
      </div>
    </main>
  </div>

  <script type="module">
    import { initAppShell } from '/js/app-shell.js';
    import { initAuth, getUser, supabase } from '/js/auth.js';
    import { initChatbot } from '/js/chatbot.js';
    import LicenseSystem from '/js/license.js';

    initAppShell();
    await initAuth();
    initChatbot();
    const user = await getUser();
    if (!user) { window.location.href = '/'; throw new Error('No auth'); }
    const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();

    const { data: contratos, error } = await supabase
      .from('contratos')
      .select('*')
      .order('created_at', { ascending: false });

    const container = document.getElementById('lista-contratos');
    container.innerHTML = '';

    if (!contratos || contratos.length === 0) {
      document.getElementById('empty-state').style.display = '';
      return;
    }

    const table = document.createElement('table');
    table.innerHTML = `
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Título</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${contratos.map(c => `
          <tr>
            <td><span class="badge">${c.tipo || '—'}</span></td>
            <td>${c.titulo || 'Sin título'}</td>
            <td>${new Date(c.created_at).toLocaleDateString('es-ES')}</td>
            <td><a href="/app/contratos/editor.html?id=${c.id}" class="btn btn-secondary" style="font-size:0.8rem;">✏️ Editar</a></td>
          </tr>
        `).join('')}
      </tbody>
    `;
    container.appendChild(table);
  </script>
</body>
</html>
