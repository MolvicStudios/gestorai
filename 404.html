<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Página no encontrada | GestorAI.pro</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .error-container { max-width: 480px; padding: 2rem; }
    .error-code { font-size: 6rem; font-weight: 800; color: var(--color-primary); line-height: 1; }
    .error-msg { font-size: 1.25rem; color: var(--color-text-muted); margin: 1rem 0 2rem; }
    .btn-home {
      display: inline-block; padding: .75rem 2rem;
      background: var(--color-primary); color: #fff;
      border-radius: var(--radius-md); text-decoration: none;
      font-weight: 600; transition: opacity .2s;
    }
    .btn-home:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <p class="error-msg">Esta página no existe o ha sido movida.</p>
    <a href="/" class="btn-home">Volver al inicio</a>
  </div>
</body>
</html>
